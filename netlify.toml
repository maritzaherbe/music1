# Netlify deploy config for the Next.js app.
# The official Next.js runtime plugin turns API routes into serverless functions,
# which is where SUNO_API_KEY lives (never shipped to the browser).

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# NOTE: Do NOT put secrets here. Set SUNO_API_KEY in:
#   Netlify dashboard → Site configuration → Environment variables
